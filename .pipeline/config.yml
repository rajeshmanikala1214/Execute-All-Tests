general:
  buildTool: "npm"

stages:

  Additional Unit Tests:
    wdi5Tests:
      type: npmExecuteTests
      params:
        script: this
        dockerImage: "devxci/mbtci-java17-node20"
        runAsRoot: true
        dockerSidecarImage: 'selenium/standalone-chrome'
        installCommand: "npm ci"
        runCommand: "npm run wdi5"
        baseUrl: "http://example.com/index.html"
        urlOptionPrefix: "--base-url="
        usernameEnvVar: "wdi5_username"
        passwordEnvVar: "wdi5_password"
        envs:
          - "NPM_CONFIG_PREFIX=~/.npm-global"
        paths:
          - "~/.npm-global/bin"
        verbose: true

    uiveri5Tests:
      type: npmExecuteTests
      params:
        script: this
        dockerImage: "devxci/mbtci-java17-node20"
        dockerImage: 'ndevxci/mbtci-java17-node20'
        runAsRoot: true
        installCommand: "npm install @ui5/uiveri5 --global --quiet"
        runCommand: "/home/node/.npm-global/bin/uiveri5"
        baseUrl: "http://localhost:8080/index.html"
        urlOptionPrefix: "--base-url="
        usernameEnvVar: "PIPER_SELENIUM_HUB_USER"
        passwordEnvVar: "PIPER_SELENIUM_HUB_PASSWORD"
        envs:
          - "NPM_CONFIG_PREFIX=~/.npm-global"
        paths:
          - "~/.npm-global/bin"
        runOptions:
          - "--seleniumAddress=http://localhost:4444/wd/hub"
        verbose: true

    testsPublishResults:
      failOnError: false
      junit:
        pattern: "**/reports/TESTS.xml"
        archive: true
      cobertura:
        pattern: "**/coverage/coverage.xml"
        archive: true

  Static Code Checks:
    sonarExecuteScan:
      serverUrl: "https://sonar-dev.releaseowl.com"
      projectKey: "execute-test-cases"
      waitForQualityGate: true