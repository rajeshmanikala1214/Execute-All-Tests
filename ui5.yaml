specVersion: "3.1"
metadata:
  name: execute-test-cases
type: application
resources:
  configuration:
    paths:
      webapp: webapp # This points to where your index.html and manifest.json live
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /resources
      configuration:
        baseUri: https://ui5.sap.com